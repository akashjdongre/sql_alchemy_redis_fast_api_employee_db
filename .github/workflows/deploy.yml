name: Deploy to AWS ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      # 1. Download your code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Connect GitHub Actions to AWS using your IAM keys
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id    : ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region           : ${{ secrets.AWS_REGION }}

      # 3. Login to ECR (AWS's Docker Hub)
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Build Docker image and push to ECR
      - name: Build, Tag and Push Image to ECR
        id: build-image
        env:
          ECR_REGISTRY  : ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG     : ${{ github.sha }}        # unique tag per commit
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # 5. Download current task definition from ECS
      - name: Download Task Definition
        run: |
          aws ecs describe-task-definition \
            --task-definition fast-api-emp-task \
            --query taskDefinition > task-definition.json

      # 6. Update task definition with the new image
      - name: Update ECS Task Definition with New Image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name : ${{ secrets.CONTAINER_NAME }}
          image          : ${{ steps.build-image.outputs.image }}

      # 7. Deploy updated task definition to ECS Service
      - name: Deploy to ECS Service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition      : ${{ steps.task-def.outputs.task-definition }}
          service              : ${{ secrets.ECS_SERVICE }}
          cluster              : ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true    # waits until new container is healthy
